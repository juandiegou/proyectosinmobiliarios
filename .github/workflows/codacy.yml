# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow checks out code, performs a Codacy security scan
# and integrates the results with the
# GitHub Advanced Security code scanning feature.  For more information on
# the Codacy security scan action usage and parameters, see
# https://github.com/codacy/codacy-analysis-cli-action.
# For more information on Codacy Analysis CLI in general, see
# https://github.com/codacy/codacy-analysis-cli.

name: Codacy Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "main" ]
  schedule:
    - cron: '18 5 * * 6'

permissions:
  contents: read

jobs:
  codacy-security-scan:
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    name: Codacy Security Scan
    runs-on: ubuntu-latest
    steps:
      # Checkout the repository to the GitHub Actions runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Use the Node.js version pinned in .nvmrc so eslint-config-next and
      # @rushstack/eslint-patch (which require the 'node:path' specifier) work correctly.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      # Install Node.js dependencies so ESLint can resolve eslint-config-next
      # and other packages declared in Prueba/FRONT/propital/package.json.
      - name: Install frontend dependencies
        run: npm install
        working-directory: Prueba/FRONT/propital

      # Install Python dependencies for the backend API so Codacy's Python
      # analyzers (e.g. pylint, bandit) can resolve imported packages.
      - name: Install backend dependencies
        run: pip install --user -r requirements.txt
        working-directory: Prueba/API

      # --- Frontend analysis (JavaScript / ESLint) ---
      # Scoped to Prueba/FRONT/propital so ESLint can find .eslintrc.json
      # (there is no ESLint config at the repository root).
      - name: Run Codacy Analysis CLI (Frontend)
        uses: codacy/codacy-analysis-cli-action@d840f886c4bd4edc059706d09c6a1586111c540b
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          verbose: true
          output: results-frontend.sarif
          format: sarif
          directory: ${{ github.workspace }}/Prueba/FRONT/propital
          gh-code-scanning-compat: true
          max-allowed-issues: 2147483647

      # --- Backend analysis (Python) ---
      # Scoped to Prueba/API so Codacy's Python tools (pylint, bandit, etc.)
      # analyse the FastAPI service and its dependencies.
      - name: Run Codacy Analysis CLI (Backend)
        uses: codacy/codacy-analysis-cli-action@d840f886c4bd4edc059706d09c6a1586111c540b
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          verbose: true
          output: results-backend.sarif
          format: sarif
          directory: ${{ github.workspace }}/Prueba/API
          gh-code-scanning-compat: true
          max-allowed-issues: 2147483647

      # Upload SARIF results from both analyses
      - name: Upload frontend SARIF results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results-frontend.sarif

      - name: Upload backend SARIF results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results-backend.sarif
